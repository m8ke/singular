<article class="guide">
    <header>
        <h1>
            Quick Start
        </h1>

        <p>
            Get started with Singular in minutes.
        </p>
    </header>

    <section>
        <section>
            <h2 id="requirements">
                Requirements
            </h2>

            <section sg-table class="w-full">
                <thead sg-table-header>
                <tr sg-table-row>
                    <th sg-table-column>
                        Technology
                    </th>
                    <th sg-table-column>
                        Version
                    </th>
                </tr>
                </thead>

                <tbody sg-table-content>
                <tr sg-table-row>
                    <td sg-table-cell>
                        Angular
                    </td>
                    <td sg-table-cell>
                        v21
                    </td>
                </tr>

                <tr sg-table-row>
                    <td sg-table-cell>
                        TailwindCSS
                    </td>
                    <td sg-table-cell>
                        v4
                    </td>
                </tr>
                </tbody>
            </section>
        </section>

        <section>
            <h2 id="install">
                Install dependency
            </h2>

            <docs-code-area [code]="'code'" />
        </section>

        <section>
            <h2 id="css">
                Import CSS
            </h2>

            <p>
                Import Tailwind CSS and Singular to <code>src/styles.css</code>
            </p>

            <docs-code-area
                [code]="'code'"
                [showLines]="true"
            />
        </section>
    </section>
</article>
