<nav
    #nav
    class="border-b border-default sticky top-0 z-50 bg-background/50 backdrop-blur-sm">
    <div class="px-6 mx-auto">
        <div class="flex flex-row items-center justify-between gap-x-4 py-3">
            <img
                [src]="logoUrl"
                alt="Singular"
                class="cursor-pointer w-25 select-none"
                height="45"
                width="203"
                routerLink="/"
            />

            <section class="flex flex-1 items-center">
                <button sg-button size="sm" variant="ghost" routerLink="/docs/getting-started" [routerLinkActiveOptions]="{ exact: false }">
                    Getting Started
                </button>
                <button sg-button size="sm" variant="ghost"  routerLink="/docs/components" [routerLinkActiveOptions]="{ exact: false }">
                    Components
                </button>
                <button sg-button size="sm" variant="ghost"  routerLink="/docs/pipes" [routerLinkActiveOptions]="{ exact: false }">
                    Pipes
                </button>
                <button sg-button size="sm" variant="ghost"  routerLink="/docs/services" [routerLinkActiveOptions]="{ exact: false }">
                    Services
                </button>
            </section>

            <section class="flex flex-row items-center gap-x-2">
                <a sg-button size="sm" variant="tertiary" radius="full" href="https://github.com/m8ke/singular" target="_blank">
                    GitHub
                </a>

                <button sg-button (click)="toggleTheme()" size="sm" variant="tertiary" [isIcon]="true" radius="full">
                    @if (activeTheme() == "dark") {
                        <svg lucideMoon />
                    } @else {
                        <svg lucideSun />
                    }
                </button>
            </section>
        </div>
    </div>
</nav>

<main
    class="mx-auto h-full"
    [style.--nav-height.px]="nav.offsetHeight">
    <router-outlet />
</main>
